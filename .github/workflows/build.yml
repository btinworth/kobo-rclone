name: Build KoboRclone

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  job:
    name: Build KoboRclone
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create KoboRoot
        run: |
          ./makeKoboRoot.sh

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          path: KoboRoot.tgz
          archive: false
